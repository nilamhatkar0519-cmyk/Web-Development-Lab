<!DOCTYPE html>
<html>
<head>
    <title>Experiment No 9</title>
    <style>
        body {
            font-family: Arial;
            background: radial-gradient( #d7dbe0, #91bfed, #107deb);
        }

        .container {
            width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .gender {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
        }

        .btn {
            width: 48%;
            padding: 10px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .register {
            background-color: rgb(88, 231, 88);
        }

        .clear {
            background-color: rgb(244, 85, 85);
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h1> Experiment 9 : Employee Registration Form </h1>
    <p> <b>Name :</b> Nilam Hatakar </p>    
    <p> <b>Roll No :</b> 70 </p>
    <hr>

<div class="container">
    <h2>Employee Registration</h2>

    <form onsubmit="return validateForm()">
        
        <label>Employee Name:</label>
        <input type="text" id="name" required>

        <label>Employee ID:</label>
        <input type="text" id="id" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Mobile Number:</label>
        <input type="text" id="mobile" required>

        <label>Gender:</label>
        <div class="gender">
            <label><input type="radio" name="gender"> Male</label>
            <label><input type="radio" name="gender"> Female</label>
        </div>

        <label>Department:</label>
        <select>
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select>

        <label>Address:</label>
        <textarea rows="3"></textarea>

        <div class="buttons">
            <button type="submit" class="btn register">Register</button>
            <button type="reset" class="btn clear">Clear</button>
        </div>

    </form>
</div>

<script>
function validateForm() {
    let mobile = document.getElementById("mobile").value;

    if (mobile.length !== 10 || isNaN(mobile)) {
        alert("Enter valid 10-digit mobile number");
        return false;
    }

    alert("Registration Successful!");
    return true;
}
</script>

</body>
</html>
